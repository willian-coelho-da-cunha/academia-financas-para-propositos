<div class="get-started">
  <mat-card class="get-started__card">
    <mat-card-header class="get-started__header">
      <mat-card-title class="get-started__title">Get Started</mat-card-title>
      <mat-card-subtitle class="get-started__subtitle">Upload your .txt file to begin</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="get-started__content">
      <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()" class="get-started__form">
        <div class="get-started__file-input-container">
          <label class="get-started__file-label">Select a .txt file</label>
          <input
            type="file"
            accept=".txt"
            (change)="onFileChange($event)"
            formControlName="file"
            class="get-started__file-input"
          />
          <mat-icon class="get-started__file-icon">attach_file</mat-icon>
        </div>
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="!uploadForm.valid"
          class="get-started__submit-button"
        >
          <mat-icon>upload</mat-icon>
          Submit
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
