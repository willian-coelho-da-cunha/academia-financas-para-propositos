<main class="manage-project">
  <mat-toolbar
    class="manage-project__toolbar"
    [color]="'primary'"
  >
    <button
      mat-icon-button
      class="manage-project__toolbar__back-button"
      type="button"
      data-testid="back-button"
      (click)="goBack()"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="manage-project__toolbar__title">Propósitos</span>

    <span class="spacer"></span>

    <button
      mat-raised-button
      class="manage-project__toolbar__button"
      type="button"
      data-testid="download-button"
      [color]="'accent'"
      [disabled]="downloadDataDisabled"
      (click)="downloadData()"
    >
      <mat-icon>download</mat-icon>
      Download
    </button>

    <button
      mat-raised-button
      class="manage-project__toolbar__button"
      type="button"
      data-testid="add-new-button"
      [color]="'accent'"
      (click)="add()"
    >
      <mat-icon>add</mat-icon>
      Adicionar Novo
    </button>

    <button
      mat-raised-button
      class="manage-project__toolbar__button"
      type="button"
      data-testid="analytics-button"
      [color]="'accent'"
      (click)="goToAnalytics()"
    >
      <mat-icon>analytics</mat-icon>
      Analytics
    </button>
  </mat-toolbar>

  <mat-card class="manage-project__card">
    <mat-card-content class="manage-project__card__content">
      <table
        mat-table
        class="manage-project__table"
        [dataSource]="paginatedData"
      >
        <ng-container matColumnDef="order">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Ordem
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.order }}
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Nome
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Descrição
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.description }}
          </td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Valor
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.amount | currency:'BRL':'symbol':'1.2-2' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Situação
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.status }}
          </td>
        </ng-container>

        <ng-container matColumnDef="releasedAt">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Realizado em
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.releasedAt | date: 'short' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Ações
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            <button
              mat-icon-button
              type="button"
              [color]="'primary'"
              (click)="edit(element)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              (click)="delete(element)"
              [color]="'warn'"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns"
        ></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
        ></tr>
      </table>

      <mat-paginator
        showFirstLastButtons
        class="manage-project__paginator"
        [pageSizeOptions]="pageSizeOptions"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [length]="totalItems"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</main>
